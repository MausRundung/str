<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Str Explorer</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #050505;
            --bg-panel: #0f0f0f;
            --bg-hover: #161616;
            --border: #222;
            --border-hover: #333;
            --text-main: #e0e0e0;
            --text-muted: #555;
            --folder: #60a5fa;
            --accent: #3b82f6;
            --c-route: #10b981;
            --c-socket: #f43f5e;
            --c-socket-on: #eab308;
            --c-table: #f59e0b;
            --c-type: #9333ea; /* Purple */
            --c-export: #d97706; /* Amber */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        #sidebar { width: 300px; min-width: 300px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; transition: margin-left 0.3s; }
        body.sidebar-collapsed #sidebar { margin-left: -300px; }

        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .sidebar-header h1 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }

        #input-section { transition: max-height 0.4s ease; max-height: 0; overflow: hidden; background: #000; }
        #input-section.visible { max-height: 400px; border-bottom: 1px solid var(--border); }
        textarea { width: 100%; height: 160px; background: transparent; border: none; padding: 15px; color: var(--c-route); font-family: 'JetBrains Mono', monospace; font-size: 11px; resize: none; outline: none; }
        .parse-btn { width: calc(100% - 30px); margin: 0 15px 15px 15px; padding: 10px; background: var(--text-main); color: #000; border: none; font-weight: 700; cursor: pointer; border-radius: 4px; font-size: 11px; }

        .sidebar-content { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .sidebar-content::-webkit-scrollbar { width: 4px; }
        .sidebar-content::-webkit-scrollbar-thumb { background: #222; }

        .section-title { font-size: 9px; text-transform: uppercase; color: var(--text-muted); font-weight: 800; letter-spacing: 1.2px; margin-bottom: 8px; border-bottom: 1px solid #1a1a1a; padding-bottom: 4px; }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 11px; color: var(--text-main); cursor: pointer; }
        
        .switch { position: relative; display: inline-block; width: 26px; height: 14px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 10px; width: 10px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(12px); }

        /* --- FLOATING SEARCH --- */
        .floating-search-hub { position: fixed; top: 20px; left: 320px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; transition: left 0.3s; }
        body.sidebar-collapsed .floating-search-hub { left: 20px; }
        .search-pill { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(12px); border: 1px solid var(--border-hover); border-radius: 50px; padding: 4px 10px 4px 16px; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 420px; }
        .search-pill input { background: transparent; border: none; color: #fff; font-size: 12px; outline: none; flex-grow: 1; }
        .chip { padding: 4px 8px; border-radius: 20px; font-size: 9px; font-weight: 800; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; background: #111; color: var(--text-muted); }
        .chip.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* --- MAIN VIEW --- */
        #main-view { flex-grow: 1; position: relative; overflow: auto; padding: 100px 40px; scroll-behavior: smooth; }
        .view-tools { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 8px; }
        .tool-btn { background: var(--bg-panel); border: 1px solid var(--border); color: var(--text-main); height: 32px; padding: 0 10px; display: flex; align-items: center; gap: 6px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; }

        #tree-container { width: 65%; position: relative; z-index: 2; }
        .folder-block { margin-bottom: 2px; }
        .folder-name { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .folder-children { border-left: 1px solid #1a1a1a; margin-left: 5px; padding-left: 15px; }

        /* File Card */
        .file-card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; padding: 10px; transition: 0.2s; cursor: pointer; }
        .file-card:hover { border-color: var(--border-hover); background: var(--bg-hover); }
        .file-name-row { font-size: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace; display: flex; justify-content: space-between; align-items: center; }
        .line-badge { font-size: 9px; color: #444; font-weight: 400; }
        
        .card-data-section { margin-top: 8px; font-family: 'JetBrains Mono', monospace; font-size: 10px; border-top: 1px solid #1a1a1a; padding-top: 8px; }
        .card-data-row { display: flex; flex-direction: column; gap: 4px; padding: 2px 0; }
        .data-label { font-weight: 800; min-width: 55px; font-size: 8px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
        .data-val { color: var(--text-main); word-break: break-all; line-height: 1.4; }

        /* Data Tags */
        .tag-container { display: flex; flex-wrap: wrap; gap: 4px; padding-top: 2px; }
        .data-tag { display: inline-flex; align-items: center; gap: 5px; padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 500; line-height: 1.5; background: var(--bg-hover); border: 1px solid var(--border-hover); }
        .data-tag .method { font-weight: 800; font-size: 8px; opacity: 0.7; }
        .data-tag.route { color: var(--c-route); }
        .data-tag.socket-emit { color: var(--c-socket); }
        .data-tag.socket-on { color: var(--c-socket-on); }
        .data-tag.table { color: var(--c-table); }
        .data-tag.type { color: var(--c-type); }
        .data-tag.export { color: var(--c-export); }
        .data-tag.import { color: #888; }


        /* Toggles Hiding Card Sections */
        body.hide-card-routes .card-row-routes,
        body.hide-card-sockets .card-row-sockets,
        body.hide-card-tables .card-row-tables,
        body.hide-card-imports .card-row-imports,
        body.hide-card-types .card-row-types,
        body.hide-card-exports .card-row-exports { display: none; }

        .isolated-target { background: rgba(59, 130, 246, 0.1) !important; border-color: var(--accent) !important; transform: scale(1.01); }
        .hidden-node { display: none !important; }
        body.focus-mode .file-card:not(.active-focus):not(.isolated-target) { opacity: 0.1; filter: blur(1px); }

        /* Connections */
        #svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .arc { fill: none; opacity: 0; transition: opacity 0.3s; stroke: var(--border-hover); stroke-width: 1.5px; }
        .arc.active-focus { opacity: 1 !important; stroke: var(--accent); stroke-width: 2px; }

        /* --- MANIFEST PANEL --- */
        #inspector { 
            position: fixed; bottom: 20px; right: 20px; width: 450px; max-height: calc(100vh - 40px);
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px); border: 1px solid var(--border-hover); 
            border-radius: 8px; padding: 16px; z-index: 1000; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .manifest-toolbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid #222; margin-bottom: 12px; }
        #inspector-scroll { overflow-y: auto; flex-grow: 1; padding-right: 8px; }
        #inspector-scroll::-webkit-scrollbar { width: 3px; }
        #inspector-scroll::-webkit-scrollbar-thumb { background: #333; }

        .manifest-section { margin-bottom: 12px; }
        .manifest-header { font-size: 9px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
        
        .relation-item { padding: 8px 0; border-top: 1px solid #181818; }
        .relation-item:first-child { border-top: none; }
        .relation-path { font-size: 10px; color: var(--text-main); margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; font-weight: 600; }
        .relation-reasons { display: flex; flex-direction: column; gap: 4px; padding-left: 10px; border-left: 1px solid #222; }
        .reason-item { font-family: 'JetBrains Mono'; font-size: 9px; }
        .reason-item .type { font-weight: 800; text-transform: uppercase; min-width: 50px; display: inline-block; }
        .reason-item .type-import { color: #888; }
        .reason-item .type-socket { color: var(--c-socket); }
        .related-file-summary { background: rgba(0,0,0,0.2); border-left: 2px solid var(--border-hover); padding: 8px 10px; margin-top: 8px; border-radius: 0 4px 4px 0; }
        .related-file-summary .manifest-section { margin-bottom: 6px; }
        .related-file-summary .manifest-header { font-size: 8px; color: #666; margin-bottom: 4px; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header">
            <i data-lucide="scan-eye" size="16" color="var(--accent)"></i>
            <h1>Str Explorer</h1>
        </div>
        <div id="input-section" class="visible">
            <textarea id="data-input" placeholder="Paste Str analysis data..."></textarea>
            <button class="parse-btn" onclick="buildSystem()">INITIALIZE SYSTEM</button>
        </div>
        <div class="sidebar-content">
            <div>
                <div class="section-title">Tree Card Content</div>
                <label class="toggle-row"> Show Routes <label class="switch"><input type="checkbox" checked onchange="document.body.classList.toggle('hide-card-routes'); drawArcs();"><span class="slider"></span></label></label>
                <label class="toggle-row"> Show Sockets <label class="switch"><input type="checkbox" checked onchange="document.body.classList.toggle('hide-card-sockets'); drawArcs();"><span class="slider"></span></label></label>
                <label class="toggle-row"> Show Tables <label class="switch"><input type="checkbox" checked onchange="document.body.classList.toggle('hide-card-tables'); drawArcs();"><span class="slider"></span></label></label>
                <label class="toggle-row"> Show Types <label class="switch"><input type="checkbox" checked onchange="document.body.classList.toggle('hide-card-types'); drawArcs();"><span class="slider"></span></label></label>
                <label class="toggle-row"> Show Exports <label class="switch"><input type="checkbox" checked onchange="document.body.classList.toggle('hide-card-exports'); drawArcs();"><span class="slider"></span></label></label>
                <label class="toggle-row"> Show Imports <label class="switch"><input type="checkbox" checked onchange="document.body.classList.toggle('hide-card-imports'); drawArcs();"><span class="slider"></span></label></label>
            </div>
            <div>
                <div class="section-title">Connection Layer</div>
                <label class="toggle-row"> Map Imports <label class="switch"><input type="checkbox" id="opt-imports" checked onchange="refreshSelection()"><span class="slider"></span></label></label>
                <label class="toggle-row"> Map Sockets <label class="switch"><input type="checkbox" id="opt-sockets" checked onchange="refreshSelection()"><span class="slider"></span></label></label>
            </div>
        </div>
    </aside>

    <div class="floating-search-hub">
        <div class="search-pill">
            <i data-lucide="search" size="14" color="var(--text-muted)"></i>
            <input type="text" id="search-input" placeholder="Quick search..." oninput="filterSystem()">
            <div style="display:flex; gap:5px;">
                <div class="chip" onclick="toggleChip(this, 'has-route')">ROUTES</div>
                <div class="chip" onclick="toggleChip(this, 'has-socket')">SOCKETS</div>
            </div>
        </div>
    </div>

    <main id="main-view">
        <div class="view-tools">
            <button class="tool-btn" onclick="toggleSidebar()"><i data-lucide="menu" size="14"></i> View</button>
            <button class="tool-btn" onclick="openNew()"><i data-lucide="plus" size="14"></i> New</button>
        </div>
        <div id="tree-container"></div>
        <svg id="svg-layer"></svg>
    </main>

    <div id="inspector">
        <div class="manifest-toolbar">
            <div style="font-size:10px; font-weight:800; color:var(--accent); letter-spacing: 1px;">FILE MANIFEST</div>
            <div style="display:flex; gap:6px;">
                <button class="tool-btn" id="reset-btn" style="display:none; color:var(--c-socket); border-color: rgba(244, 63, 94, 0.2);" onclick="clearSelection()">RESET</button>
                <button class="tool-btn" id="copy-btn" disabled onclick="copySystemReport()">COPY</button>
            </div>
        </div>
        <div id="inspector-scroll">
            <div id="inspector-content" style="color:var(--text-muted); font-size:11px;">Select a file for isolation analysis.</div>
        </div>
    </div>

<script>
    let fileRegistry = [];
    let relationLinks = [];
    let activeFileDomId = null;
    let activeChips = new Set();
    let projectBasePath = null; // Will hold the root path, e.g., "C:/Jansky-Design/2026/Nexus/Web"

    function handleFileCardClick(event) {
        if (event.shiftKey) {
            event.preventDefault();
            event.stopPropagation();
            const card = event.currentTarget;
            if (!card) return;

            if (!projectBasePath) {
                alert("Project base path could not be determined from the input data.\n\nPlease ensure the data includes a line like:\n=== ANALYZING ARCHITECTURE: C:\\Your\\Project\\Path ===");
                return;
            }

            const dataPath = card.dataset.path;
            const relativePath = dataPath.substring(5).replace(/\\/g, '/'); // Remove "ROOT\" prefix and normalize
            const absolutePath = `${projectBasePath}/${relativePath}`;
            const url = `trae://file/${absolutePath}`;

            // This triggers the custom protocol handler without opening a new window
            window.location.href = url;
        }
    }

    function toggleSidebar() { document.body.classList.toggle('sidebar-collapsed'); setTimeout(drawArcs, 300); }
    function openNew() { document.getElementById('input-section').classList.add('visible'); }
    function toggleChip(el, cls) { 
        el.classList.toggle('active'); 
        if(activeChips.has(cls)) activeChips.delete(cls); else activeChips.add(cls);
        filterSystem();
    }

    function buildSystem() {
        const txt = document.getElementById('data-input').value;
        if(!txt) return;
        document.getElementById('input-section').classList.remove('visible');
        document.getElementById('tree-container').innerHTML = renderTree(parseToGraph(txt));
        
        if (!projectBasePath) {
            console.warn("Project base path not found. Shift-click to open files will be disabled.");
        }

        lucide.createIcons();
        mapRelations();
        setTimeout(drawArcs, 200);
    }

    function parseToGraph(text) {
        // Reset global state for new data
        projectBasePath = null;
        fileRegistry = [];
        const root = { name: "ROOT", type: "dir", children: {}, path: "ROOT" };
        let activeFile = null;
        const lines = text.split('\n');

        // First, explicitly find the project base path from the analysis header
        for (const line of lines) {
            const raw = line.trim();
            const basePathMatch = raw.match(/=== ANALYZING ARCHITECTURE: (.*) ===/);
            if (basePathMatch && basePathMatch[1]) {
                projectBasePath = basePathMatch[1].trim().replace(/\\/g, '/'); // Normalize to forward slashes
                break; // Exit loop once found
            }
        }

        lines.forEach(line => {
            const raw = line.trim();
            if (!raw || raw.startsWith('===') || raw.startsWith('[MODELS]') || raw.startsWith('[STATE ]') && raw.includes("DbContext")) return;

            if (raw.startsWith('FILE:')) {
                const match = raw.match(/FILE: \\(.*) \((\d+) lines\)/);
                if (match) {
                    const pathStr = "ROOT\\" + match[1];
                    const lineCount = match[2];
                    const parts = pathStr.split('\\');
                    let curr = root;
                    parts.forEach((part, i) => {
                        if (i === parts.length - 1) {
                            const fileObj = { 
                                id: pathStr, name: part, lines: lineCount, 
                                routes: [], sockets: { emits: [], ons: [] }, imports: [], 
                                tables: [], state: [], exports: [], types: [] 
                            };
                            curr.children[part] = fileObj;
                            fileRegistry.push(fileObj);
                            activeFile = fileObj;
                        } else {
                            if (!curr.children[part]) curr.children[part] = { name: part, type: "dir", children: {} };
                            curr = curr.children[part];
                        }
                    });
                }
            } else if (raw.startsWith('[DIR]')) {
                activeFile = null;
            } else if (activeFile) {
                const tagMatch = raw.match(/^\s*\[\s*([A-Z]+)\s*\]/);
                if (!tagMatch) return;
                
                const tag = tagMatch[1];
                const content = raw.substring(raw.indexOf(']') + 1).trim();
                const items = content.split(',').map(s => s.trim()).filter(Boolean);

                switch (tag) {
                    case 'ROUTES':
                        const routeMatches = content.match(/\[(.*?)\] (.*?) -> (.*?)(?=\s*\[|$)/g);
                        if (routeMatches) {
                            activeFile.routes = routeMatches.map(m => {
                                const parts = m.match(/\[(.*?)\] (.*?) -> (.*)/);
                                return parts ? { method: parts[1], path: parts[2] } : null;
                            }).filter(Boolean);
                        }
                        break;
                    case 'SOCKET':
                        items.forEach(item => {
                            if (item.startsWith('emit:')) activeFile.sockets.emits.push(item.replace('emit:', '').trim());
                            if (item.startsWith('on:')) activeFile.sockets.ons.push(item.replace('on:', '').trim());
                        });
                        break;
                    case 'TABLES': activeFile.tables = items; break;
                    case 'STATE': activeFile.state = items; break;
                    case 'IMPORTS': activeFile.imports = items; break;
                    case 'EXPORTS': activeFile.exports = items; break;
                    case 'TYPES': activeFile.types = items; break;
                }
            }
        });
        return root;
    }

    function renderTree(node) {
        if (node.id) {
            const domId = 'f_' + btoa(node.id).replace(/[^a-zA-Z0-9]/g, '');
            let detailItems = [];
            
            const toTags = (items, type) => {
                if (!items || !Array.isArray(items) || items.length === 0) return '';
                let content = '';
                switch(type) {
                    case 'routes': content = items.map(r => `<span class="data-tag route"><span class="method">${r.method}</span> ${r.path}</span>`).join(''); break;
                    case 'sockets': 
                        content += items.emits.map(e => `<span class="data-tag socket-emit">EMIT: ${e}</span>`).join('');
                        content += items.ons.map(o => `<span class="data-tag socket-on">ON: ${o}</span>`).join('');
                        break;
                    case 'tables': content = items.map(t => `<span class="data-tag table">${t}</span>`).join(''); break;
                    case 'types': content = items.map(t => `<span class="data-tag type">${t}</span>`).join(''); break;
                    case 'exports': content = items.map(e => `<span class="data-tag export">${e}</span>`).join(''); break;
                    case 'imports': content = items.map(i => `<span class="data-tag import" title="${i}">${i.split('/').pop()}</span>`).join(''); break;
                }
                return `<div class="tag-container">${content}</div>`;
            }
            
            if (node.routes.length) detailItems.push(`<div class="card-data-row card-row-routes"><span class="data-label">Routes</span><div class="data-val">${toTags(node.routes, 'routes')}</div></div>`);
            if (node.sockets.emits.length || node.sockets.ons.length) detailItems.push(`<div class="card-data-row card-row-sockets"><span class="data-label">Sockets</span><div class="data-val">${toTags(node.sockets, 'sockets')}</div></div>`);
            if (node.tables.length) detailItems.push(`<div class="card-data-row card-row-tables"><span class="data-label">Tables</span><div class="data-val">${toTags(node.tables, 'tables')}</div></div>`);
            if (node.types.length) detailItems.push(`<div class="card-data-row card-row-types"><span class="data-label">Types</span><div class="data-val">${toTags(node.types, 'types')}</div></div>`);
            if (node.exports.length) detailItems.push(`<div class="card-data-row card-row-exports"><span class="data-label">Exports</span><div class="data-val">${toTags(node.exports, 'exports')}</div></div>`);
            if (node.imports.length) detailItems.push(`<div class="card-data-row card-row-imports"><span class="data-label">Imports</span><div class="data-val">${toTags(node.imports, 'imports')}</div></div>`);

            let classes = "file-card";
            if(node.routes.length) classes += " has-route";
            if(node.sockets.emits.length || node.sockets.ons.length) classes += " has-socket";
            
            return `<div class="${classes}" id="${domId}" data-path="${node.id}" onclick="handleFileCardClick(event)" ondblclick="handleSelect('${domId}')">
                <div class="file-name-row">
                    <span><i data-lucide="file-code" size="12" color="var(--accent)" style="margin-right:4px;"></i>${node.name}</span>
                    <span class="line-badge">${node.lines} L</span>
                </div>
                ${detailItems.length ? `<div class="card-data-section">${detailItems.join('')}</div>` : ''}
            </div>`;
        } else {
            let html = `<div class="folder-block">`;
            if (node.name !== "ROOT") html += `<div class="folder-name"><i data-lucide="folder" size="10"></i> ${node.name}</div>`;
            html += `<div class="folder-children">`;
            for (let k in node.children) html += renderTree(node.children[k]);
            return html + `</div></div>`;
        }
    }

    function mapRelations() {
        const consolidatedLinks = new Map();
        const nameMap = new Map(fileRegistry.map(f => [f.name.replace(/\.[^/.]+$/, ""), f]));
        const addReason = (source, target, reason) => {
            const key = [source.id, target.id].sort().join('--');
            if (!consolidatedLinks.has(key)) {
                consolidatedLinks.set(key, { 
                    source: 'f_' + btoa(source.id).replace(/[^a-zA-Z0-9]/g, ''), 
                    target: 'f_' + btoa(target.id).replace(/[^a-zA-Z0-9]/g, ''),
                    sourcePath: source.id,
                    targetPath: target.id,
                    reasons: []
                });
            }
            consolidatedLinks.get(key).reasons.push(reason);
        };

        fileRegistry.forEach(src => {
            src.imports.forEach(imp => {
                const tgtName = imp.split('/').pop().replace(/\.[^/.]+$/, "");
                const tgt = nameMap.get(tgtName);
                if (tgt && tgt.id !== src.id) {
                    addReason(src, tgt, { type: 'import', detail: imp, direction: 'out' });
                }
            });
            src.sockets.emits.forEach(emitEvt => {
                fileRegistry.forEach(tgt => {
                    if (src.id !== tgt.id && tgt.sockets.ons.includes(emitEvt)) {
                        addReason(src, tgt, { type: 'socket', detail: emitEvt, direction: 'out' });
                    }
                });
            });
        });
        relationLinks = Array.from(consolidatedLinks.values());
    }

    function handleSelect(domId) {
        if (activeFileDomId === domId) { clearSelection(); return; }
        activeFileDomId = domId;
        refreshManifest();
    }

    function refreshManifest() {
        if (!activeFileDomId) return;
        const domId = activeFileDomId;
        const filePath = document.getElementById(domId).dataset.path;
        const file = fileRegistry.find(f => f.id === filePath);
        if(!file) return;

        document.body.classList.add('focus-mode');
        document.getElementById('reset-btn').style.display = 'flex';
        document.getElementById('copy-btn').disabled = false;
        
        const showImp = document.getElementById('opt-imports').checked;
        const showSoc = document.getElementById('opt-sockets').checked;
        
        const connectedLinks = relationLinks.filter(link => {
            const hasSocket = link.reasons.some(r => r.type === 'socket');
            const hasImport = link.reasons.some(r => r.type === 'import');
            const relevant = (link.sourcePath === filePath || link.targetPath === filePath);
            return relevant && ((showImp && hasImport) || (showSoc && hasSocket));
        });

        const relatedDomIds = new Set([domId]);
        connectedLinks.forEach(link => {
            relatedDomIds.add(link.source);
            relatedDomIds.add(link.target);
        });
        
        document.querySelectorAll('.file-card').forEach(el => {
            el.classList.remove('isolated-target', 'active-focus', 'hidden-node');
            if (el.id === domId) el.classList.add('isolated-target');
            else if (relatedDomIds.has(el.id)) el.classList.add('active-focus');
            else el.classList.add('hidden-node');
        });

        document.querySelectorAll('.folder-block').forEach(f => {
            f.classList.toggle('hidden-node', !f.querySelector('.file-card:not(.hidden-node)'));
        });
        
        const section = (title, items, icon, tagType) => {
            if (!items || !Array.isArray(items) || items.length === 0) return '';
             let contentHtml = '';
            if (tagType === 'sockets') {
                 contentHtml = `<div class="tag-container">` +
                    items.emits.map(e => `<span class="data-tag socket-emit">${e}</span>`).join('') +
                    items.ons.map(o => `<span class="data-tag socket-on">${o}</span>`).join('') +
                 `</div>`;
            } else {
                 const mapToTag = (item) => {
                    switch (tagType) {
                        case 'routes': return `<span class="data-tag route"><span class="method">${item.method}</span> ${item.path}</span>`;
                        case 'tables': return `<span class="data-tag table">${item}</span>`;
                        case 'types': return `<span class="data-tag type">${item}</span>`;
                        case 'exports': return `<span class="data-tag export">${item}</span>`;
                        default: return `<span class="data-tag">${item}</span>`;
                    }
                };
                contentHtml = `<div class="tag-container">${items.map(mapToTag).join('')}</div>`;
            }
            return `<div class="manifest-section"><div class="manifest-header"><i data-lucide="${icon}" size="10"></i> ${title}</div>${contentHtml}</div>`;
        };
        
        let h = `<div style="color:var(--text-main); font-weight:700; font-size:11px; margin-bottom:10px; word-break:break-all; border-left: 2px solid var(--accent); padding-left: 8px;">${file.id} <span style="font-weight:400; color:#444;">(${file.lines} L)</span></div>`;
        h += section("API Routes", file.routes, "external-link", 'routes');
        h += section("Sockets", file.sockets, "radio-receiver", 'sockets');
        h += section("DB Tables", file.tables, "database", 'tables');
        h += section("Types", file.types, "box-select", 'types');
        h += section("Exports", file.exports, "package-export", 'exports');
        
        let relationsHtml = '';
        connectedLinks.forEach(link => {
            const otherPath = link.sourcePath === filePath ? link.targetPath : link.sourcePath;
            const otherFile = fileRegistry.find(f => f.id === otherPath);
            if (!otherFile) return;

            let reasonsHtml = link.reasons.map(reason => {
                let direction = (otherPath === link.targetPath) ? 'OUT' : 'IN';
                if (reason.type === 'import' && direction === 'IN') return ''; // Don't show "file B imports me"
                let detail = reason.detail.split('/').pop(); // Keep it short
                return `<div class="reason-item"><span class="type type-${reason.type}">${direction}: ${reason.type}</span> ${detail}</div>`;
            }).join('');
            
            relationsHtml += `<div class="relation-item">
                <div class="relation-path">${otherPath}</div>
                <div class="relation-reasons">${reasonsHtml}</div>
            </div>`;
        });

        if (relationsHtml) {
             h += `<div class="manifest-section"><div class="manifest-header"><i data-lucide="git-merge" size="10"></i> Relations</div>${relationsHtml}</div>`;
        }

        document.getElementById('inspector-content').innerHTML = h;
        lucide.createIcons();
        requestAnimationFrame(() => {
            document.getElementById(domId)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
            drawArcs();
        });
    }

    function drawArcs() { /* ... unchanged ... */ }
    function clearSelection() { /* ... unchanged ... */ }

    // --- Unchanged Functions (collapsed for brevity) ---
    function filterSystem(){const query=document.getElementById("search-input").value.toLowerCase();document.querySelectorAll(".file-card").forEach(card=>{const path=card.getAttribute("data-path").toLowerCase();const content=card.innerText.toLowerCase();let matchChip=activeChips.size===0||Array.from(activeChips).some(c=>card.classList.contains(c));card.classList.toggle("hidden-node",!matchChip||!path.includes(query)&&!content.includes(query))});document.querySelectorAll(".folder-block").forEach(f=>{f.classList.toggle("hidden-node",!f.querySelector(".file-card:not(.hidden-node)"))});drawArcs()}
    function drawArcs(){const svg=document.getElementById("svg-layer");const view=document.getElementById("main-view");svg.style.height=Math.max(view.scrollHeight,view.clientHeight)+"px";let paths="";const vRect=view.getBoundingClientRect();relationLinks.forEach(link=>{const sEl=document.getElementById(link.source),tEl=document.getElementById(link.target);if(sEl&&tEl&&!sEl.classList.contains("hidden-node")&&!tEl.classList.contains("hidden-node")){if(activeFileDomId&&link.source!==activeFileDomId&&link.target!==activeFileDomId)return;const sR=sEl.getBoundingClientRect(),tR=tEl.getBoundingClientRect();const scrollY=view.scrollTop;const sX=sR.right-vRect.left,sY=sR.top-vRect.top+scrollY+sR.height/2;const eX=tR.right-vRect.left,eY=tR.top-vRect.top+scrollY+tR.height/2;const cp=Math.max(sX,eX)+80+Math.abs(sY-eY)*.1;paths+=`<path class="arc ${link.source===activeFileDomId||link.target===activeFileDomId?"active-focus":""}" d="M ${sX} ${sY} C ${cp} ${sY}, ${cp} ${eY}, ${eX} ${eY}" />`}});svg.innerHTML=paths}
    function clearSelection(){activeFileDomId=null;document.body.classList.remove("focus-mode");document.getElementById("reset-btn").style.display="none";document.getElementById("copy-btn").disabled=true;document.querySelectorAll(".file-card, .folder-block").forEach(el=>el.classList.remove("hidden-node","isolated-target","active-focus"));document.getElementById("inspector-content").innerHTML="Select a file for isolation analysis.";filterSystem()}
    function generateManifestText(file){if(!file)return"";let text=`--- FILE: ${file.id} (${file.lines} L) ---\n\n`;const sectionToString=(title,items,formatter)=>{if(!items||items.length===0)return"";let sectionText=`${title}:\n`;sectionText+=items.map(formatter).join("\n");return sectionText+"\n\n"};text+=sectionToString("API Routes",file.routes,r=>`  [${r.method}] ${r.path}`);text+=sectionToString("Socket Emissions",file.sockets.emits,e=>`  - ${e}`);text+=sectionToString("Socket Listeners",file.sockets.ons,o=>`  - ${o}`);text+=sectionToString("Database Tables",file.tables,t=>`  - ${t}`);text+=sectionToString("State Context",file.state,s=>`  - ${s}`);text+=sectionToString("Imports",file.imports,i=>`  - ${i}`);return text}
    function copySystemReport(){if(!activeFileDomId)return;const mainFile=fileRegistry.find(f=>"f_"+btoa(f.id).replace(/[^a-zA-Z0-9]/g,"")===activeFileDomId);if(!mainFile)return;let clipboardText="### ISOLATION REPORT ###\n\n";clipboardText+="--- PRIMARY FILE ---\n"+generateManifestText(mainFile);const showImp=document.getElementById("opt-imports").checked;const showSoc=document.getElementById("opt-sockets").checked;const relatedFilePaths=new Set;relationLinks.forEach(link=>{if(link.source===activeFileDomId||link.target===activeFileDomId){const hasSocket=link.reasons.some(r=>r.type==="socket");const hasImport=link.reasons.some(r=>r.type==="import");if(showImp&&hasImport||showSoc&&hasSocket){relatedFilePaths.add(link.sourcePath);relatedFilePaths.add(link.targetPath)}}});relatedFilePaths.delete(mainFile.id);if(relatedFilePaths.size>0){clipboardText+="\n--- RELATED FILES ---\n\n";relatedFilePaths.forEach(path=>{const relatedFile=fileRegistry.find(f=>f.id===path);if(relatedFile){clipboardText+=generateManifestText(relatedFile)}})}navigator.clipboard.writeText(clipboardText.trim()).then(()=>{const b=document.getElementById("copy-btn");b.innerText="COPIED";setTimeout(()=>b.innerText="COPY",2e3)})}

    window.addEventListener('resize', drawArcs);
    document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });
</script>
