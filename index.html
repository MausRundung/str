<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Str Explorer</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <aside id="sidebar">
        <div class="sidebar-header">
            <i data-lucide="scan-eye" size="16" color="var(--accent)"></i>
            <h1>Str Explorer</h1>
        </div>
        <div id="input-section" class="visible">
            <textarea id="data-input" placeholder="Paste Str analysis data..."></textarea>
            <button class="parse-btn" onclick="buildSystem()">INITIALIZE SYSTEM</button>
        </div>
        <div class="sidebar-content">
            <div class="section-group">
                <div class="section-title">Tree Card Content</div>
                <label class="toggle-row"> Show Routes <label class="switch"><input type="checkbox" checked onchange="handleContentToggle('hide-card-routes')"><span class="slider"></span></label></label>
                <label class="toggle-row"> Show Sockets <label class="switch"><input type="checkbox" checked onchange="handleContentToggle('hide-card-sockets')"><span class="slider"></span></label></label>
                <label class="toggle-row"> Show Tables <label class="switch"><input type="checkbox" checked onchange="handleContentToggle('hide-card-tables')"><span class="slider"></span></label></label>
                <label class="toggle-row"> Show Types <label class="switch"><input type="checkbox" checked onchange="handleContentToggle('hide-card-types')"><span class="slider"></span></label></label>
                <label class="toggle-row"> Show Exports <label class="switch"><input type="checkbox" checked onchange="handleContentToggle('hide-card-exports')"><span class="slider"></span></label></label>
                <label class="toggle-row"> Show Imports <label class="switch"><input type="checkbox" checked onchange="handleContentToggle('hide-card-imports')"><span class="slider"></span></label></label>
            </div>
            <div class="section-group">
                <div class="section-title">Connection Layer</div>
                <label class="toggle-row"> Map Imports <label class="switch"><input type="checkbox" id="opt-imports" checked onchange="refreshSelection()"><span class="slider"></span></label></label>
                <label class="toggle-row"> Map Sockets <label class="switch"><input type="checkbox" id="opt-sockets" checked onchange="refreshSelection()"><span class="slider"></span></label></label>
            </div>
        </div>
    </aside>

    <div class="floating-search-hub">
        <div class="search-pill">
            <i data-lucide="search" size="14" color="var(--text-muted)"></i>
            <input type="text" id="search-input" placeholder="Quick search..." oninput="filterSystem()">
            <div style="display:flex; gap:5px;">
                <div class="chip" onclick="toggleChip(this, 'has-route')">ROUTES</div>
                <div class="chip" onclick="toggleChip(this, 'has-socket')">SOCKETS</div>
            </div>
        </div>
    </div>

    <main id="main-view">
        <div class="view-tools">
            <button class="tool-btn" onclick="toggleSidebar()"><i data-lucide="menu" size="14"></i> View</button>
            <button class="tool-btn" onclick="openNew()"><i data-lucide="plus" size="14"></i> New</button>
        </div>
        <div id="tree-container"></div>
        <svg id="svg-layer"></svg>
    </main>

    <div id="inspector">
        <div class="manifest-toolbar">
            <div class="manifest-label">FILE MANIFEST</div>
            <div style="display:flex; gap:6px;">
                <button class="tool-btn" id="reset-btn" style="display:none;" onclick="clearSelection()">RESET</button>
                <button class="tool-btn" id="copy-btn" disabled onclick="copySystemReport()">COPY</button>
            </div>
        </div>
        <div id="inspector-scroll">
            <div id="inspector-content">Select a file for isolation analysis.</div>
        </div>
    </div>

    <!-- Logic Files -->
    <script src="str-data.js" onerror="this.onerror=null; this.remove();"></script>
    <script src="parser.js"></script>
    <script src="renderer.js"></script>
    <script src="viz.js"></script>
    <script src="app.js"></script>
</body>
</html>
